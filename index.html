<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Service Auftrag</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 40px; }
        .document { background: white; width: 210mm; margin: auto; padding: 20mm; border: 1px solid #ccc; }
        h1 { color: #2c3e50; border-bottom: 2px solid #3498db; }
        
        .row, .row-header { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        .row-header { font-weight: bold; color: #555; }
        .row input { padding: 8px; border: 1px solid #ccc; }
        
        .service-input, .header-service { flex: 2; }
        .price-input, .header-price { flex: 1; }
        
        /* New styling for total */
        #totalRow { display: flex; gap: 10px; margin-top: 20px; font-weight: bold; font-size: 1.2em; border-top: 2px solid #eee; padding-top: 10px; }
        .total-label { flex: 2; text-align: right; }
        .total-value { flex: 1; }
    </style>
</head>
<body>

<div class="document" id="printable">
    <h1>Service Auftrag</h1>
    <p>Sehr geehrter Kunde, hiermit erhalten Sie unser Angebot.</p>
    
    <div id="serviceContainer">
        <div class="row-header">
            <div class="header-service">Service/Leistung</div>
            <div class="header-price">Service Preis</div>
        </div>
    </div>

    <div id="totalRow">
        <div class="total-label">Gesamt:</div>
        <div class="total-value"><span id="totalSum">0</span> €</div>
    </div>
    
    <button onclick="addRow()">+ Service hinzufügen</button>
</div>

<div style="text-align: center; margin-top: 30px;">
    <button onclick="submitChanges()" style="padding: 15px 30px; font-size: 18px; background: #3498db; color: white; border: none;">Angebot als PDF senden</button>
</div>

<script>
    const GET_WEBHOOK = "https://hook.eu1.make.com/ach77us1si5kbnspnbcwdm6jvoz2yrl9";
    // UPDATE THIS URL BELOW TO YOUR NEW PDF SCENARIO WEBHOOK:
    const POST_WEBHOOK = "https://hook.eu1.make.com/5oihly6e2i9ns02faaj8pxt0ivy19k5y"; 
    
    const urlParams = new URLSearchParams(window.location.search);
    const orderId = urlParams.get('orderId') || urlParams.get('orderid');

    // Function to calculate sum
    function calculateTotal() {
        let sum = 0;
        document.querySelectorAll('.price-input').forEach(input => {
            sum += parseFloat(input.value) || 0;
        });
        document.getElementById('totalSum').textContent = sum.toFixed(2);
    }

    function addRow(service = "", price = "") {
        const container = document.getElementById('serviceContainer');
        const div = document.createElement('div');
        div.className = 'row';
        div.innerHTML = `
            <input type="text" class="service-input" value="${service}" placeholder="Service">
            <input type="number" class="price-input" value="${price}" placeholder="Preis" oninput="calculateTotal()">
        `;
        container.appendChild(div);
        calculateTotal(); // Calculate whenever a row is added
    }

    if (orderId) {
        fetch(`${GET_WEBHOOK}?orderId=${orderId}`)
            .then(res => res.json())
            .then(data => {
                const items = Array.isArray(data) ? data : [data];
                items.forEach(item => {
                    if(item.service || item.totalServicePrice) {
                        addRow(item.service || "", item.totalServicePrice || "");
                    }
                });
            });
    }

    function submitChanges() {
        const fullHTML = document.getElementById('printable').outerHTML;
        fetch(POST_WEBHOOK, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ orderId: orderId, htmlContent: fullHTML })
        }).then(() => alert("Das Angebot wurde erfolgreich gesendet!"));
    }
</script>
</body>
</html>
